<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04111d"></stop>
      <stop offset="100%" stop-color="#0c1d2f"></stop>
    </linearGradient>

    <filter id="glowBlue">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#38bdf8" flood-opacity="0.45"></feDropShadow>
    </filter>

    <filter id="glowOrange">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#f97316" flood-opacity="0.45"></feDropShadow>
    </filter>

    <style>
      .title { fill:#f8fafc; font-family:Arial, Helvetica, sans-serif; font-size:34px; font-weight:700; }
      .subtitle { fill:#cbd5e1; font-family:Arial, Helvetica, sans-serif; font-size:17px; }
      .label { fill:#f8fafc; font-family:Arial, Helvetica, sans-serif; font-size:19px; font-weight:700; }
      .text { fill:#cbd5e1; font-family:Arial, Helvetica, sans-serif; font-size:14px; }
      .small { fill:#94a3b8; font-family:Arial, Helvetica, sans-serif; font-size:12px; }
      .frame { fill:#102336; stroke:#334155; stroke-width:1.8; rx:18; ry:18; }
      .link { stroke:#64748b; stroke-width:2.2; fill:none; stroke-dasharray:7 6; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg2)"></rect>

  <text x="40" y="56" class="title">Fragment Recovery Graph</text>
  <text x="40" y="86" class="subtitle">Memory fragments remain position-aware under loss, enabling visible gaps and reconstructable continuity</text>

  <!-- Panels -->
  <rect x="40" y="130" width="360" height="430" class="frame"></rect>
  <rect x="460" y="130" width="360" height="430" class="frame"></rect>
  <rect x="880" y="130" width="360" height="430" class="frame"></rect>

  <text x="80" y="170" class="label">A. Healthy Graph</text>
  <text x="500" y="170" class="label">B. Fragment Loss</text>
  <text x="920" y="170" class="label">C. Recovered Continuity</text>

  <!-- A -->
  <line x1="130" y1="330" x2="210" y2="250" class="link"></line>
  <line x1="210" y1="250" x2="300" y2="320" class="link"></line>
  <line x1="300" y1="320" x2="350" y2="240" class="link"></line>
  <line x1="210" y1="250" x2="220" y2="420" class="link"></line>
  <line x1="300" y1="320" x2="300" y2="420" class="link"></line>

  <circle cx="130" cy="330" r="19" fill="#38bdf8" filter="url(#glowBlue)"></circle>
  <circle cx="210" cy="250" r="19" fill="#38bdf8" filter="url(#glowBlue)"></circle>
  <circle cx="300" cy="320" r="19" fill="#38bdf8" filter="url(#glowBlue)"></circle>
  <circle cx="350" cy="240" r="19" fill="#38bdf8" filter="url(#glowBlue)"></circle>
  <circle cx="220" cy="420" r="19" fill="#38bdf8" filter="url(#glowBlue)"></circle>
  <circle cx="300" cy="420" r="19" fill="#38bdf8" filter="url(#glowBlue)"></circle>

  <text x="88" y="500" class="text">All fragments present.</text>
  <text x="88" y="522" class="text">Memory graph is complete and exact.</text>

  <!-- B -->
  <line x1="550" y1="330" x2="630" y2="250" class="link"></line>
  <line x1="630" y1="250" x2="720" y2="320" class="link"></line>
  <line x1="720" y1="320" x2="770" y2="240" class="link"></line>
  <line x1="630" y1="250" x2="640" y2="420" class="link"></line>
  <line x1="720" y1="320" x2="720" y2="420" class="link"></line>

  <circle cx="550" cy="330" r="19" fill="#38bdf8" filter="url(#glowBlue)"></circle>
  <circle cx="630" cy="250" r="19" fill="#ef4444" filter="url(#glowOrange)">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="720" cy="320" r="19" fill="#38bdf8" filter="url(#glowBlue)"></circle>
  <circle cx="770" cy="240" r="19" fill="#ef4444" filter="url(#glowOrange)">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.9s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="640" cy="420" r="19" fill="#38bdf8" filter="url(#glowBlue)"></circle>
  <circle cx="720" cy="420" r="19" fill="#ef4444" filter="url(#glowOrange)">
    <animate attributeName="opacity" values="1;0.25;1" dur="2.2s" repeatCount="indefinite"></animate>
  </circle>

  <text x="505" y="500" class="text">Destroyed fragments stay visible.</text>
  <text x="505" y="522" class="text">Loss becomes structural information.</text>

  <!-- C -->
  <line x1="970" y1="330" x2="1050" y2="250" class="link"></line>
  <line x1="1050" y1="250" x2="1140" y2="320" class="link"></line>
  <line x1="1140" y1="320" x2="1190" y2="240" class="link"></line>
  <line x1="1050" y1="250" x2="1060" y2="420" class="link"></line>
  <line x1="1140" y1="320" x2="1140" y2="420" class="link"></line>

  <circle cx="970" cy="330" r="19" fill="#38bdf8" filter="url(#glowBlue)"></circle>
  <circle cx="1050" cy="250" r="19" fill="#f97316" filter="url(#glowOrange)">
    <animate attributeName="r" values="16;22;16" dur="1.7s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="1140" cy="320" r="19" fill="#38bdf8" filter="url(#glowBlue)"></circle>
  <circle cx="1190" cy="240" r="19" fill="#f97316" filter="url(#glowOrange)">
    <animate attributeName="r" values="16;22;16" dur="2s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="1060" cy="420" r="19" fill="#38bdf8" filter="url(#glowBlue)"></circle>
  <circle cx="1140" cy="420" r="19" fill="#f97316" filter="url(#glowOrange)">
    <animate attributeName="r" values="16;22;16" dur="2.3s" repeatCount="indefinite"></animate>
  </circle>

  <path d="M720 320 C820 260, 900 250, 1050 250" stroke="#f97316" stroke-width="4" fill="none" opacity="0.95">
    <animate attributeName="stroke-dasharray" values="0,240;50,10;0,240" dur="2.4s" repeatCount="indefinite"></animate>
  </path>

  <path d="M720 420 C840 420, 930 430, 1140 420" stroke="#38bdf8" stroke-width="4" fill="none" opacity="0.95">
    <animate attributeName="stroke-dasharray" values="0,280;60,10;0,280" dur="2.8s" repeatCount="indefinite"></animate>
  </path>

  <text x="925" y="500" class="text">Recovered continuity keeps the task usable,</text>
  <text x="925" y="522" class="text">even when exact memory is incomplete.</text>

  <!-- legend -->
  <rect x="180" y="610" width="920" height="58" class="frame"></rect>
  <circle cx="235" cy="639" r="12" fill="#38bdf8"></circle>
  <text x="258" y="645" class="text">Alive fragment</text>
  <circle cx="490" cy="639" r="12" fill="#ef4444"></circle>
  <text x="513" y="645" class="text">Destroyed fragment</text>
  <circle cx="790" cy="639" r="12" fill="#f97316"></circle>
  <text x="813" y="645" class="text">Recovered / patched continuity</text>
</svg>