<svg width="1600" height="520" viewBox="0 0 1600 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="XLifelineAI banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"></stop>
      <stop offset="100%" stop-color="#f8fbff"></stop>
    </linearGradient>

    <linearGradient id="blueLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.15"></stop>
      <stop offset="50%" stop-color="#2563eb" stop-opacity="0.95"></stop>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0.15"></stop>
    </linearGradient>

    <linearGradient id="orangeLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fdba74" stop-opacity="0.15"></stop>
      <stop offset="50%" stop-color="#f97316" stop-opacity="0.95"></stop>
      <stop offset="100%" stop-color="#fdba74" stop-opacity="0.15"></stop>
    </linearGradient>

    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.42"></stop>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="orangeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.35"></stop>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"></stop>
    </radialGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#94a3b8" flood-opacity="0.16"></feDropShadow>
    </filter>

    <filter id="blueNodeGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#2563eb" flood-opacity="0.30"></feDropShadow>
    </filter>

    <filter id="orangeNodeGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#f97316" flood-opacity="0.28"></feDropShadow>
    </filter>

    <clipPath id="roundedClip">
      <rect x="24" y="24" width="1552" height="472" rx="28" ry="28"></rect>
    </clipPath>

    <style>
      .title {
        fill: #0f172a;
        font-family: Inter, Arial, Helvetica, sans-serif;
        font-size: 64px;
        font-weight: 800;
        letter-spacing: -1.6px;
      }
      .subtitle {
        fill: #334155;
        font-family: Inter, Arial, Helvetica, sans-serif;
        font-size: 26px;
        font-weight: 500;
      }
      .tag {
        fill: #0f172a;
        font-family: Inter, Arial, Helvetica, sans-serif;
        font-size: 21px;
        font-weight: 600;
      }
      .small {
        fill: #64748b;
        font-family: Inter, Arial, Helvetica, sans-serif;
        font-size: 17px;
        font-weight: 500;
      }
      .chipText {
        fill: #0f172a;
        font-family: Inter, Arial, Helvetica, sans-serif;
        font-size: 18px;
        font-weight: 700;
      }
    </style>
  </defs>

  <!-- Main canvas -->
  <rect x="24" y="24" width="1552" height="472" rx="28" ry="28" fill="url(#bg)" filter="url(#softShadow)"></rect>

  <!-- background glows -->
  <g clip-path="url(#roundedClip)">
    <circle cx="1300" cy="110" r="220" fill="url(#blueGlow)">
      <animate attributeName="r" values="200;235;200" dur="8s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="1180" cy="390" r="180" fill="url(#orangeGlow)">
      <animate attributeName="r" values="160;195;160" dur="7s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="240" cy="430" r="140" fill="url(#blueGlow)" opacity="0.35">
      <animate attributeName="r" values="130;150;130" dur="9s" repeatCount="indefinite"></animate>
    </circle>
  </g>

  <!-- subtle top border light -->
  <rect x="40" y="40" width="1520" height="2" rx="1" fill="url(#blueLine)" opacity="0.55"></rect>

  <!-- left copy -->
  <g transform="translate(96,116)">
    <rect x="0" y="0" width="224" height="42" rx="21" fill="#eff6ff" stroke="#bfdbfe"></rect>
    <circle cx="26" cy="21" r="7" fill="#2563eb" filter="url(#blueNodeGlow)">
      <animate attributeName="r" values="6;8;6" dur="1.8s" repeatCount="indefinite"></animate>
      <animate attributeName="opacity" values="1;0.65;1" dur="1.8s" repeatCount="indefinite"></animate>
    </circle>
    <text x="44" y="27" class="small" fill="#1d4ed8">Failure-Native AI Runtime</text>

    <text x="0" y="104" class="title">XLifelineAI</text>
    <text x="0" y="148" class="subtitle">Local AI that survives memory loss</text>

    <text x="0" y="222" class="tag">Data → Fragment → Graph → Rebuild</text>
    <text x="0" y="266" class="small">Deterministic Fragment Graphs • Continuity Engine • Runtime Recovery</text>

    <!-- chips -->
    <g transform="translate(0,320)">
      <rect x="0" y="0" width="168" height="48" rx="24" fill="#eff6ff" stroke="#bfdbfe"></rect>
      <text x="28" y="31" class="chipText">CPU-first</text>

      <rect x="184" y="0" width="214" height="48" rx="24" fill="#fff7ed" stroke="#fed7aa"></rect>
      <text x="214" y="31" class="chipText">Continuity-native</text>

      <rect x="414" y="0" width="188" height="48" rx="24" fill="#f8fafc" stroke="#cbd5e1"></rect>
      <text x="442" y="31" class="chipText">Open-source</text>
    </g>
  </g>

  <!-- right visual system -->
  <g clip-path="url(#roundedClip)">
    <!-- network lines -->
    <g opacity="0.92">
      <path d="M980 140 C1085 105, 1180 115, 1270 160" stroke="url(#blueLine)" stroke-width="3.2" fill="none"></path>
      <path d="M980 140 C1035 220, 1100 255, 1188 274" stroke="url(#blueLine)" stroke-width="3.2" fill="none"></path>
      <path d="M1188 274 C1260 244, 1320 242, 1402 282" stroke="url(#orangeLine)" stroke-width="3.2" fill="none"></path>
      <path d="M1270 160 C1330 195, 1372 246, 1402 282" stroke="url(#blueLine)" stroke-width="3.2" fill="none"></path>
      <path d="M1100 392 C1175 350, 1258 332, 1344 354" stroke="url(#orangeLine)" stroke-width="3.2" fill="none"></path>
      <path d="M1188 274 C1180 330, 1146 362, 1100 392" stroke="url(#blueLine)" stroke-width="3.2" fill="none"></path>
      <path d="M980 140 C960 240, 992 315, 1100 392" stroke="url(#orangeLine)" stroke-width="3.2" fill="none"></path>

      <!-- animated signal dots -->
      <circle r="5" fill="#2563eb">
        <animateMotion dur="4.8s" repeatCount="indefinite" path="M980 140 C1085 105, 1180 115, 1270 160"></animateMotion>
      </circle>
      <circle r="5" fill="#f97316">
        <animateMotion dur="4.2s" repeatCount="indefinite" path="M980 140 C1035 220, 1100 255, 1188 274"></animateMotion>
      </circle>
      <circle r="5" fill="#2563eb">
        <animateMotion dur="4.6s" repeatCount="indefinite" path="M1188 274 C1260 244, 1320 242, 1402 282"></animateMotion>
      </circle>
      <circle r="5" fill="#f97316">
        <animateMotion dur="5.0s" repeatCount="indefinite" path="M1188 274 C1180 330, 1146 362, 1100 392"></animateMotion>
      </circle>
    </g>

    <!-- node cluster -->
    <g>
      <!-- healthy nodes -->
      <circle cx="980" cy="140" r="18" fill="#2563eb" filter="url(#blueNodeGlow)">
        <animate attributeName="r" values="17;20;17" dur="2.8s" repeatCount="indefinite"></animate>
      </circle>

      <circle cx="1270" cy="160" r="16" fill="#2563eb" filter="url(#blueNodeGlow)">
        <animate attributeName="r" values="15;18;15" dur="3.2s" repeatCount="indefinite"></animate>
      </circle>

      <circle cx="1188" cy="274" r="18" fill="#2563eb" filter="url(#blueNodeGlow)">
        <animate attributeName="r" values="17;20;17" dur="2.6s" repeatCount="indefinite"></animate>
      </circle>

      <circle cx="1402" cy="282" r="16" fill="#2563eb" filter="url(#blueNodeGlow)">
        <animate attributeName="r" values="15;18;15" dur="3.0s" repeatCount="indefinite"></animate>
      </circle>

      <circle cx="1100" cy="392" r="18" fill="#2563eb" filter="url(#blueNodeGlow)">
        <animate attributeName="r" values="17;20;17" dur="2.4s" repeatCount="indefinite"></animate>
      </circle>

      <circle cx="1344" cy="354" r="15" fill="#2563eb" filter="url(#blueNodeGlow)">
        <animate attributeName="r" values="14;17;14" dur="3.1s" repeatCount="indefinite"></animate>
      </circle>

      <!-- damaged / rebuilt nodes -->
      <circle cx="1048" cy="220" r="16" fill="#ef4444" opacity="0.92">
        <animate attributeName="opacity" values="1;0.22;1" dur="1.7s" repeatCount="indefinite"></animate>
        <animate attributeName="r" values="16;18;16" dur="1.7s" repeatCount="indefinite"></animate>
      </circle>

      <circle cx="1232" cy="236" r="16" fill="#ef4444" opacity="0.92">
        <animate attributeName="opacity" values="1;0.18;1" dur="1.9s" repeatCount="indefinite"></animate>
        <animate attributeName="r" values="16;18;16" dur="1.9s" repeatCount="indefinite"></animate>
      </circle>

      <!-- recovered nodes -->
      <circle cx="1140" cy="180" r="16" fill="#f97316" filter="url(#orangeNodeGlow)">
        <animate attributeName="r" values="14;19;14" dur="1.8s" repeatCount="indefinite"></animate>
      </circle>

      <circle cx="1268" cy="320" r="16" fill="#f97316" filter="url(#orangeNodeGlow)">
        <animate attributeName="r" values="14;19;14" dur="2.1s" repeatCount="indefinite"></animate>
      </circle>
    </g>

    <!-- subtle fragment tiles -->
    <g opacity="0.92">
      <rect x="926" y="78" width="76" height="36" rx="12" fill="#eff6ff" stroke="#bfdbfe"></rect>
      <text x="949" y="101" class="small" fill="#1d4ed8">data</text>

      <rect x="1330" y="110" width="96" height="36" rx="12" fill="#fff7ed" stroke="#fed7aa"></rect>
      <text x="1358" y="133" class="small" fill="#c2410c">rebuild</text>

      <rect x="1068" y="436" width="108" height="36" rx="12" fill="#f8fafc" stroke="#cbd5e1"></rect>
      <text x="1096" y="459" class="small">continue</text>
    </g>

    <!-- animated recovery halo -->
    <circle cx="1188" cy="274" r="72" fill="none" stroke="#2563eb" stroke-width="1.6" opacity="0.22">
      <animate attributeName="r" values="62;96;62" dur="4.8s" repeatCount="indefinite"></animate>
      <animate attributeName="opacity" values="0.28;0.04;0.28" dur="4.8s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="1188" cy="274" r="98" fill="none" stroke="#f97316" stroke-width="1.4" opacity="0.14">
      <animate attributeName="r" values="88;122;88" dur="5.6s" repeatCount="indefinite"></animate>
      <animate attributeName="opacity" values="0.16;0.03;0.16" dur="5.6s" repeatCount="indefinite"></animate>
    </circle>
  </g>
</svg>