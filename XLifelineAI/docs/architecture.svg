<svg width="1400" height="860" viewBox="0 0 1400 860" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06111f"></stop>
      <stop offset="100%" stop-color="#0b1f33"></stop>
    </linearGradient>

    <radialGradient id="coreGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.9"></stop>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"></stop>
    </radialGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#38bdf8" flood-opacity="0.25"></feDropShadow>
    </filter>

    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <polygon points="0,0 14,7 0,14" fill="#7dd3fc"></polygon>
    </marker>

    <style>
      .title { fill:#f8fafc; font-family:Arial, Helvetica, sans-serif; font-size:38px; font-weight:700; }
      .subtitle { fill:#cbd5e1; font-family:Arial, Helvetica, sans-serif; font-size:18px; }
      .label { fill:#f8fafc; font-family:Arial, Helvetica, sans-serif; font-size:20px; font-weight:700; }
      .text { fill:#cbd5e1; font-family:Arial, Helvetica, sans-serif; font-size:14px; }
      .small { fill:#94a3b8; font-family:Arial, Helvetica, sans-serif; font-size:12px; }
      .boxBlue { fill:#0f2742; stroke:#38bdf8; stroke-width:2.2; rx:18; ry:18; filter:url(#shadow); }
      .boxOrange { fill:#2a1a0d; stroke:#f97316; stroke-width:2.2; rx:18; ry:18; filter:url(#shadow); }
      .boxSlate { fill:#13263a; stroke:#64748b; stroke-width:2; rx:18; ry:18; filter:url(#shadow); }
      .line { stroke:#7dd3fc; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#475569; stroke-width:2; fill:none; stroke-dasharray:8 7; }
    </style>
  </defs>

  <rect width="1400" height="860" fill="url(#bg)"></rect>

  <!-- moving particles -->
  <circle r="2.5" fill="#7dd3fc" opacity="0.8">
    <animateMotion dur="8s" repeatCount="indefinite" path="M80,760 C350,620 450,300 700,220 C930,160 1120,250 1310,160"></animateMotion>
  </circle>
  <circle r="2.2" fill="#f97316" opacity="0.8">
    <animateMotion dur="10s" repeatCount="indefinite" path="M120,180 C350,260 560,340 810,500 C1010,620 1170,690 1290,760"></animateMotion>
  </circle>

  <text x="50" y="58" class="title">XLifelineAI Runtime — Failure-Native Architecture</text>
  <text x="50" y="90" class="subtitle">Local AI that survives memory loss through continuity-driven reconstruction</text>

  <!-- top row -->
  <rect x="70" y="150" width="220" height="110" class="boxSlate"></rect>
  <text x="105" y="192" class="label">User / Operator</text>
  <text x="105" y="220" class="text">/ask, /corrupt-memory,</text>
  <text x="105" y="242" class="text">/rebuild, /continue</text>

  <rect x="355" y="150" width="245" height="110" class="boxBlue"></rect>
  <text x="390" y="192" class="label">Runtime Shell</text>
  <text x="390" y="220" class="text">CLI + command processor</text>
  <text x="390" y="242" class="text">stable local interaction layer</text>

  <rect x="670" y="150" width="275" height="110" class="boxOrange"></rect>
  <text x="708" y="192" class="label">Continuity Engine</text>
  <text x="708" y="220" class="text">detect loss, rebuild context,</text>
  <text x="708" y="242" class="text">resume usable state</text>

  <rect x="1020" y="150" width="285" height="110" class="boxBlue"></rect>
  <text x="1060" y="192" class="label">Model Adapter</text>
  <text x="1060" y="220" class="text">mock model / local LLM</text>
  <text x="1060" y="242" class="text">CPU-first, small-GPU optional</text>

  <path d="M290 205 L355 205" class="line"></path>
  <path d="M600 205 L670 205" class="line"></path>
  <path d="M945 205 L1020 205" class="line"></path>

  <!-- center core -->
  <circle cx="700" cy="450" r="130" fill="url(#coreGlow)">
    <animate attributeName="r" values="120;138;120" dur="3.5s" repeatCount="indefinite"></animate>
  </circle>

  <rect x="495" y="375" width="410" height="150" class="boxBlue"></rect>
  <text x="545" y="418" class="label">DFG Memory Layer</text>
  <text x="545" y="446" class="text">Memory stored as deterministic fragments,</text>
  <text x="545" y="468" class="text">not a single fragile linear context blob.</text>
  <text x="545" y="496" class="small">Fragment schema: index + data + destroyed flag</text>

  <!-- bottom row -->
  <rect x="120" y="650" width="250" height="110" class="boxSlate"></rect>
  <text x="160" y="692" class="label">Storage Layer</text>
  <text x="160" y="720" class="text">MemoryStore / LocalStore</text>
  <text x="160" y="742" class="text">manifest persistence</text>

  <rect x="460" y="650" width="250" height="110" class="boxOrange"></rect>
  <text x="500" y="692" class="label">Chaos Engine</text>
  <text x="500" y="720" class="text">controlled fragment damage</text>
  <text x="500" y="742" class="text">for demo + benchmark</text>

  <rect x="800" y="650" width="250" height="110" class="boxBlue"></rect>
  <text x="840" y="692" class="label">Integrity Layer</text>
  <text x="840" y="720" class="text">exact / partial / degraded</text>
  <text x="840" y="742" class="text">continuity scoring</text>

  <rect x="1140" y="650" width="190" height="110" class="boxSlate"></rect>
  <text x="1170" y="692" class="label">Continue Task</text>
  <text x="1170" y="720" class="text">resume instead</text>
  <text x="1170" y="742" class="text">of resetting</text>

  <path d="M575 525 L245 650" class="line"></path>
  <path d="M640 525 L585 650" class="line"></path>
  <path d="M760 525 L925 650" class="line"></path>
  <path d="M1050 705 L1140 705" class="line"></path>

  <!-- pulse rings -->
  <circle cx="700" cy="450" r="165" fill="none" stroke="#38bdf8" stroke-width="1.4" opacity="0.25">
    <animate attributeName="r" values="145;180;145" dur="4.5s" repeatCount="indefinite"></animate>
    <animate attributeName="opacity" values="0.4;0.05;0.4" dur="4.5s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="700" cy="450" r="190" fill="none" stroke="#f97316" stroke-width="1.2" opacity="0.18">
    <animate attributeName="r" values="175;210;175" dur="5.2s" repeatCount="indefinite"></animate>
    <animate attributeName="opacity" values="0.25;0.03;0.25" dur="5.2s" repeatCount="indefinite"></animate>
  </circle>

  <text x="385" y="815" class="subtitle">Run → Fail → Detect → Reconstruct → Continue</text>
</svg>